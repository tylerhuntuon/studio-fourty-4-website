    body: Oopsie! Nothing worse than breaking a nail. Let's fix her up, so you can
      look and feel your best!
    time: 15 mins
    image: null
  basicNailArt:
    heading: Basic Nail Art
    subheading: Basic Nail Art
    body: "Includes: Basic abstract or geometric art, lines, 2-6 gems, letters,
      shapes, small flower, glitter polish on 1 nail each hand.​"
    time: 15 mins
    image: null
  frenchTip:
    heading: French Tip
    subheading: French Tip
    body: all French tips are painted my hand. This includes micro frenchies, deep
      set & classic. you ask, I paint xx
    time: 30 mins
    image: null
  intermediateNailArt:
    heading: Intermediate Nail Art
    subheading: Intermediate Nail Art
    body: "Includes: Intermediate abstract or geometric art, chrome, aura art,
      letters, shapes or gems. Disclaimer: If you choose a design that takes
      over 1h to create, you will acquire the advanced nail art fee. Not sure?
      send your inspo through xx​"
    time: 40 mins
    image: null
  advancedNailArt:
    heading: Advanced Nail Art
    subheading: Advanced Nail Art
    body: "Includes: patterned French tips, 3D art, advanced abstract or geometric
      art, Junk nails, large lettering or shapes, pictures, themed nail art.
      Timeframe and price varies based on design. Disclaimer: If you choose a
      design that takes over 1h to create, you will acquire the advanced nail
      art fee. Not sure? send your inspo through xx"
    time: 1 hr, 30 mins
    image: null
